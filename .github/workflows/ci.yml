name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests data
      - name: Tests (SCD2 insert / update / late-arrival / idempotency)
        run: pytest -q

  iac:
    name: validate bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep
        run: az bicep build --file infra/main.bicep
